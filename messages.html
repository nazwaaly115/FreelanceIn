<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesan - FreelanceIn</title>
  <meta name="description"
    content="Kotak masuk percakapan antara mahasiswa IT terverifikasi dengan UMKM di FreelanceIn. Diskusikan detail proyek digital Anda.">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/messages.css">
</head>

<body>

  <!-- Navigation Header -->
  <header class="site-header">
    <div class="container nav-container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          Freelance<span>In</span>
          <div class="logo-dot"></div>
        </a>
        <nav>
          <ul class="nav-menu">
            <li class="nav-item"><a href="index.html">Home</a></li>
            <li class="nav-item"><a href="marketplace.html">Cari Talenta</a></li>
            <li class="nav-item"><a href="student-dashboard.html">Dashboard</a></li>
            <li class="nav-item text-primary"><a href="messages.html">Pesan</a></li>
          </ul>
        </nav>
      </div>

      <!-- Actions -->
      <div class="nav-right">
        <!-- Replaced dynamically by main.js, placeholder for static reference -->
        <button class="mobile-nav-toggle">
          <i data-lucide="menu"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Chat Container -->
  <div class="container py-xl">

    <div class="messages-layout" id="chat-layout-wrapper">

      <!-- LEFT COLUMN: Conversation List -->
      <div class="chat-list-pane">

        <!-- Search bar -->
        <div class="chat-list-search">
          <div class="header-search" style="width: 100%; padding-right: 0.5rem;">
            <input type="text" placeholder="Cari kontak chat..." id="chat-contact-search"
              oninput="searchChatContacts(this.value)">
            <span class="header-search-icon">
              <i data-lucide="search" style="width: 14px; height: 14px;"></i>
            </span>
          </div>
        </div>

        <!-- Threads list -->
        <div class="chat-threads-container" id="threads-list"></div>

      </div>

      <!-- RIGHT COLUMN: Chat Pane -->
      <div class="chat-pane" id="chat-pane-wrapper">

        <!-- Chat header bar -->
        <div class="chat-header-bar">
          <div class="chat-header-user">
            <!-- Back button in mobile -->
            <button class="btn btn-text btn-sm mobile-back-btn" onclick="toggleMobileChatList(true)"
              style="display: none; padding: 4px;">
              <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
            </button>
            <div class="thread-avatar-wrapper">
              <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=120&auto=format&fit=crop"
                alt="Active Chat Avatar" class="thread-avatar" id="active-chat-avatar">
              <div class="thread-online-badge"></div>
            </div>
            <div>
              <h3 style="font-size: var(--font-sm); font-weight: 700; color: var(--color-slate-900);"
                id="active-chat-name">Budi Santoso</h3>
              <span style="font-size: 11px; color: var(--color-slate-400);" id="active-chat-sub">Mahasiswa UI
                Terverifikasi</span>
            </div>
          </div>
          <div class="chat-header-actions">
            <a href="project-tracking.html" class="btn btn-outline btn-sm" id="chat-header-action-btn">Lacak Proyek</a>
          </div>
        </div>

        <!-- Chat messages area -->
        <div class="chat-messages-viewport" id="chat-messages-box">

          <!-- Sample messages dynamically loaded by script -->

        </div>

        <!-- Chat input bar control -->
        <div class="chat-input-bar">

          <!-- Attachment Button -->
          <button class="chat-attachment-btn" title="Kirim File" onclick="document.getElementById('chat-hidden-file').click()">
            <i data-lucide="paperclip" style="width: 20px; height: 20px;"></i>
          </button>
          <input type="file" id="chat-hidden-file" style="display: none;" onchange="MessagesApp.sendFile(this)">
          <textarea class="chat-input-textarea" id="chat-message-input" placeholder="Tulis pesan Anda di sini..."
            onkeydown="MessagesApp.handleKeydown(event)"></textarea>
          <button class="btn btn-primary btn-sm" onclick="MessagesApp.sendMessage()" style="padding: 10px 16px;">
            <i data-lucide="send" style="width: 16px; height: 16px; margin: 0;"></i>
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p class="footer-copy">&copy; 2026 FreelanceIn. Seluruh hak cipta dilindungi undang-undang.</p>
      </div>
    </div>
  </footer>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>

  <!-- Custom JS -->
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/messages-app.js"></script>
</body>
</html>
